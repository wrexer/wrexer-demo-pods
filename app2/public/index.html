<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostgreSQL Demo App | Wrexer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>PostgreSQL Integration</h1>
        <p class="subtitle">Showcasing seamless database connectivity with PVC storage on Wrexer.</p>

        <form id="userForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>
            <button type="submit" id="submitBtn">Register User</button>
        </form>

        <div class="divider"></div>

        <div class="users-header">
            <h2>Registered Users</h2>
            <p class="subtitle">Real-time data from your Postgres pod</p>
        </div>

        <div id="usersList" class="users-list">
            <!-- Users will be loaded here -->
            <div class="empty-state">No users registered yet.</div>
        </div>
    </div>

    <script>
        const userForm = document.getElementById('userForm');
        const usersList = document.getElementById('usersList');
        const submitBtn = document.getElementById('submitBtn');

        async function fetchUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();

                if (users.length === 0) {
                    usersList.innerHTML = '<div class="empty-state">No users registered yet.</div>';
                    return;
                }

                usersList.innerHTML = users.map(user => `
                    <div class="user-card">
                        <div class="user-info">
                            <h3>${user.name}</h3>
                            <p>${user.email}</p>
                        </div>
                        <div class="timestamp">
                            ${new Date(user.created_at).toLocaleDateString()}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Error fetching users:', err);
                usersList.innerHTML = '<div class="empty-state" style="color: #ef4444;">Error connecting to database. Make sure DATABASE_URL is set.</div>';
            }
        }

        userForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            submitBtn.textContent = 'Registering...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email })
                });

                if (response.ok) {
                    userForm.reset();
                    await fetchUsers();
                }
            } catch (err) {
                console.error('Error saving user:', err);
            } finally {
                submitBtn.textContent = 'Register User';
                submitBtn.disabled = false;
            }
        });

        // Initial load
        fetchUsers();
    </script>
</body>

</html>
